name: Deploy Extension Binaries
on:
  workflow_run:
    workflows: ["Main Extension Distribution Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy binaries
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifacts from build workflow
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create directory structure
        run: |
          mkdir -p site/v1.5.2
          mkdir -p release_assets
          for dir in artifacts/hortus_pipeline-*; do
            [ -d "$dir" ] || continue
            arch=$(echo "$dir" | sed 's/.*extension-//')
            mkdir -p "site/v1.5.2/$arch"
            for f in "$dir"/*.duckdb_extension; do
              [ -f "$f" ] || continue
              cp "$f" "site/v1.5.2/$arch/"
              cp "$f" "release_assets/hortus_pipeline-${arch}.duckdb_extension"
            done
          done
          echo "=== GitHub Pages structure ==="
          find site -type f | sort
          echo "=== Release assets ==="
          find release_assets -type f | sort

      # Deploy to GitHub Pages (for INSTALL FROM)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Create GitHub Release (for visibility and manual download)
      - name: Create or update GitHub Release v1.5.2
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.2
          name: "Hortus Pipeline Extension (DuckDB v1.5.2)"
          body: |
            ## Install

            ```sql
            INSTALL hortus_pipeline FROM 'https://neuesql.github.io/hortus-pipeline';
            LOAD hortus_pipeline;
            ```

            ## Platforms
            - Linux x86_64 (`linux_amd64`)
            - Linux ARM64 (`linux_arm64`)
            - macOS x86_64 (`osx_amd64`)
            - macOS ARM64 (`osx_arm64`)
            - Windows x86_64 (`windows_amd64`)
            - Windows MinGW (`windows_amd64_mingw`)
            - WebAssembly (`wasm_mvp`, `wasm_eh`, `wasm_threads`)
          files: release_assets/*
          make_latest: true
